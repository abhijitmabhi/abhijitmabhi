<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <style>
    .waveGroup {
      animation: floatWave 9s linear infinite;
    }
    @keyframes floatWave {
      from { transform: translateX(0); }
      to { transform: translateX(-1200px); }
    }
  </style>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <g class="waveGroup">
    <path d="M0,160 C200,120 400,190 700,150 C900,125 1050,170 1200,140 L1200,200 L0,200 Z" fill="url(#wave)"/>
    <path d="M1200,160 C1400,120 1600,190 1900,150 C2100,125 2250,170 2400,140 L2400,200 L1200,200 Z" fill="url(#wave)"/>
  </g>

  <text x="600" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    Abhijit Mondal Abhi
  </text>
  <text x="600" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" fill="#e0f2fe">
    Software Engineer — Backend &amp; Distributed Systems
  </text>
</svg>
