<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <path fill="url(#wave)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
      M0,160 C200,120 400,190 700,150 C900,125 1050,170 1200,140 L1200,200 L0,200 Z;
      M0,150 C200,185 400,115 700,165 C900,195 1050,125 1200,160 L1200,200 L0,200 Z;
      M0,165 C200,135 400,175 700,135 C900,110 1050,180 1200,150 L1200,200 L0,200 Z;
      M0,160 C200,120 400,190 700,150 C900,125 1050,170 1200,140 L1200,200 L0,200 Z
    "/>
  </path>

  <text x="600" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    Abhijit Mondal Abhi
  </text>
  <text x="600" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" fill="#e0f2fe">
    Software Engineer — Backend &amp; Distributed Systems
  </text>
</svg>
