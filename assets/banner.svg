<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="waveFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="waveBack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <style>
    .waveLayer1 {
      transform-origin: 50% 100%;
      animation: bob1 1.6s ease-in-out infinite alternate;
    }
    .waveLayer2 {
      transform-origin: 50% 100%;
      animation: bob2 2s ease-in-out infinite alternate;
    }
    @keyframes bob1 {
      from { transform: translateY(0) scaleY(1); }
      to { transform: translateY(-30px) scaleY(1.08); }
    }
    @keyframes bob2 {
      from { transform: translateY(-18px) scaleY(1.05); }
      to { transform: translateY(22px) scaleY(0.95); }
    }
  </style>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <path class="waveLayer2" d="M0,170 C250,140 450,195 700,165 C950,140 1050,180 1200,155 L1200,200 L0,200 Z" fill="url(#waveBack)"/>
  <path class="waveLayer1" d="M0,160 C200,120 400,190 700,150 C900,125 1050,170 1200,140 L1200,200 L0,200 Z" fill="url(#waveFront)"/>

  <text x="600" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    Abhijit Mondal Abhi
  </text>
  <text x="600" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" fill="#e0f2fe">
    Software Engineer — Backend &amp; Distributed Systems
  </text>
</svg>
