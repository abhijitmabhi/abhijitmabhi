<svg width="100%" height="100" viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <style>
    .waveLayerA {
      transform-origin: 50% 100%;
      animation: bobA 4s ease-in-out infinite alternate;
    }
    .waveLayerB {
      transform-origin: 50% 100%;
      animation: bobB 5s ease-in-out infinite alternate;
    }
    @keyframes bobA {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
    @keyframes bobB {
      from { transform: translateY(-5px); }
      to { transform: translateY(7px); }
    }
  </style>

  <path class="waveLayerB" d="M0,55 C250,30 450,75 700,50 C950,30 1050,65 1200,45 L1200,100 L0,100 Z" fill="url(#bg2)" opacity="0.6"/>
  <path class="waveLayerA" d="M0,40 C200,80 400,10 700,45 C900,70 1050,20 1200,50 L1200,100 L0,100 Z" fill="url(#bg2)"/>
</svg>
