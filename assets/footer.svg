      from { transform: translateX(0); }
      to { transform: translateX(-1200px); }
    }
  </style>

  <g class="waveGroup2">
    <path d="M0,40 C200,80 400,10 700,45 C900,70 1050,20 1200,50 L1200,100 L0,100 Z" fill="url(#bg2)"/>
    <path d="M1200,40 C1400,80 1600,10 1900,45 C2100,70 2250,20 2400,50 L2400,100 L1200,100 Z" fill="url(#bg2)"/>
  </g>
